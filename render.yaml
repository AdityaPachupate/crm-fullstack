services:
  # .NET API Service
  - type: web
    name: crm-api
    env: docker
    dockerContext: ./CRM.API
    dockerfilePath: Dockerfile.deploy
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__NeonProductionDb
        sync: false
      - key: DATABASE_URL
        sync: false

  # React Frontend (Static Site)
  - type: web
    name: crm-client
    runtime: static
    rootDir: crm.Client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://crm-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
