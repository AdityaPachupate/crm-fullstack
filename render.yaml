services:
  # .NET API Service
  - type: web
    name: crm-api
    env: docker
    dockerContext: ./CRM.API
    dockerfilePath: ./Dockerfile.deploy
    plan: starter # Adjust based on needs
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__NeonProductionDb
        sync: false # Set this in Render Dashboard for security
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db # Optional: if you use a Render DB, otherwise use sync: false for Neon

  # React Frontend (Static Site)
  - type: web
    name: crm-client
    env: static
    rootDir: crm.Client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://crm-api.onrender.com # Adjust match your actual API URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
