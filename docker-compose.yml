version: '3.8'

services:
  api:
    build:
      context: ./CRM.API
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__NeonProductionDb=${DATABASE_URL}
    volumes:
      - ./CRM.API/logs:/app/logs

  client:
    build:
      context: ./crm.Client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8080
